name: Build & Release CØRE PDV

on:
  push:
    tags:
      - "v*.*.*" # Dispara o build apenas quando enviar uma tag (ex: v1.0.0)

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build and Publish Electron App
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
