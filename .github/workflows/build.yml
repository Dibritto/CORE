name: Build & Release CØRE PDV

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Reconstituir certificado de assinatura
        run: |
          # Remove QUALQUER coisa que não seja caractere de Base64 (limpeza total)
          $b64 = "${{ secrets.CSC_LINK }}" -replace '[^A-Za-z0-9+/=]', ''
          $bytes = [Convert]::FromBase64String($b64)
          [IO.File]::WriteAllBytes("${{ github.workspace }}\assets\codesign.pfx", $bytes)
        shell: pwsh

      - name: Build and Publish
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ github.workspace }}\assets\codesign.pfx
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
